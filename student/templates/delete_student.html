{% extends 'base.html' %}

{% block content %}

    <div class="container">
        <h2>Delete Student for {{ data.name }} -- {{ data.enroll }}</h2>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>

            <a href="{% url 'detail' data.id %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>

{% endblock %}
