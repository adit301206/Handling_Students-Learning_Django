{% extends 'base.html' %}

{% block content %}

<div class="container">
    <h2>Login</h2>
    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Login</button>

    </form>


    {% if error %}
    <div class="alert alert-danger mt-3" role="alert">
        {{ error }}
    </div>
    {% endif %}
</div>

{% endblock %}
